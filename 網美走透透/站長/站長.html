<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/meyer-reset/2.0/reset.min.css">
	<title></title>

	<style>

		body{
			display: flex;
			justify-content: space-around;
			align-items: center;
			height: 100vh;
			width: 100vw;
		}

		.warp{
			display: flex;
			height: 100vh;
			width: 100vw;
			overflow: hidden;
		}

		.intro{
			display: flex;
			flex-direction: column;
			box-sizing: border-box;
		}

		.introContainer{
			width: 100%;
			height: 10%;
		}

		h1{
			font-size: 25px;
			margin: 10px;
			text-align: center;
			align-items: center;
		}

		h2{
			margin-left: 20px;
			letter-spacing: 1px;
  			line-height: 1.7;
  			align-self: center	;
		}
		.intoText1{
			margin-left: 0px;
			margin-right: 20px;
		}

		.container{
			display: flex;
			width: 100%;
			height: 30%;
			justify-content: center;
			align-items: center;
			margin: 5px;
			justify-self: flex-end;
		}

		.container1{
			display: flex;
			width: 100%;
			height: 30%;
			justify-content: space-between;
			align-items: center;
			box-sizing: border-box;
		}

		img{
			width: 60%;
			height: 90%;
		}

	</style>

</head>
<body>
	<div class="intro warp">
		<div class="introContainer">
			<h1>大林車站站長宿舍</h1>
		</div>

		<div class="container1">
			<h2 class="intoText1">大林車站站長宿舍位於大林車站旁，是一棟擁有歷史古味的日式風格建築。</h2>
			<img src="站1.jpg">
		</div>

		<div class="container1">
			<img src="站2.jpg">
			<h2>在站長宿舍周圍的阿勃勒在入夏時會盛開，金黃色的花伴隨著木製日式建築，是一個非常適合搭配日系服裝的拍照景點！</h2>
		</div>
		
		<div class="container">
			<iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3656.07399735758!2d120.45401541497851!3d23.601678984662854!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x346ebeb82c3788a1%3A0xb422834f6a431276!2z5aSn5p6X6LuK56uZ56uZ6ZW35a6_6IiN!5e0!3m2!1sen!2stw!4v1672735849883!5m2!1sen!2stw" width="70%" height="80%" style="border:;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
		</div>
	</div>
	
</div>
</body>
</html>
