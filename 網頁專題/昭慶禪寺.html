<!DOCTYPE html>
<html lang="zh-TW">
    <head>
        <title>昭慶禪寺</title>
    </head>
    <style>
        
        h3 {
            font-size: 1.875rem;
            font-weight: 300;
            line-height: 2.4rem;
            text-transform: uppercase;
            word-spacing: -.15rem;
        }

        h3{
            color: rgb(245, 243, 243);
        }
        figure.effect-lily{
            opacity: 1;
            position: relative;
            max-width: 400px;
            max-height: 300px;
            margin: 1.5rem;
            background-color: rgb(62, 107, 156);
            overflow: hidden;
            
        }
        figure img{
            
            opacity: 0;
            transform: translate3d(-40px,0,0);
            transition: transform .35s, opacity .35s;
        }
        figure.effect-lily:hover img {
            opacity: 1;
            transform: translate3d(0,0,0);
        }
        figure.effect-lily figcaption {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 2rem;
            box-sizing: border-box;
        }

        figure.effect-lily .content {
            width: 100%;
            height: 50%;
            position: absolute;
            left: 0;
            bottom: 0;
            padding: 2rem;
            box-sizing: border-box;
        }
        figure.effect-lily .content h3{
            opacity: 1;
           transform: translate3d(50px,-90px,0);
            transition: transform .35s;
        }
        figure.effect-lily:hover .content h3{
            opacity:0;
           transform: translate3d(0,0,0);
        }

        figure.effect-a{
            opacity: 1;
            position: relative;
            max-width: 300px;
            max-height: 400px;
            margin: 1.5rem;
            background-color: rgb(255, 140, 0);
            overflow: hidden;
            
        }
        figure img{
            
            opacity: 0;
            transform: translate3d(-40px,0,0);
            transition: transform .35s, opacity .35s;
        }
        figure.effect-a:hover img {
            opacity: 1;
            transform: translate3d(0,0,0);
        }
        figure.effect-a figcaption {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 2rem;
            box-sizing: border-box;
        }

        figure.effect-a .content {
            width: 100%;
            height: 50%;
            position: absolute;
            left: 0;
            bottom: 0;
            padding: 2rem;
            box-sizing: border-box;
        }
        figure.effect-a .content h3{
            opacity: 1;
           transform: translate3d(30px,-90px,0);
            transition: transform .35s;
        }
        figure.effect-a:hover .content h3{
            opacity:0;
           transform: translate3d(0,0,0);
        }

    </style>
    <body>
        <h1><b>沉浸宗教藝術之美─大林昭慶禪寺</b></h1>
            <figure class="effect-a">
                <img src="昭慶1.jpg">
                <figcaption>
                    <div class="content">
                        <h3><b>參天榕樹 <br>∩（★ ∀ ★）∩</b></h3>
                        
                    </div>
                </figcaption>
            </figure>
        <h2><b>寺廟歷史介紹:</b></h2>  
            <p><b>昭慶禪寺原名大埔林觀音亭紫蓮庵</b>，佔地五千餘坪，建於清嘉慶六年（西元一八零一年），光緒年間毀於祝融後重建，日本昭和天皇尚未登基前，以太子身份來台，曾和紫蓮庵觀音佛祖結緣，擔任天皇後，欽命為「昭慶禪寺」，有些人則簡稱為「昭慶寺」。</p>       
            <img src="昭慶.jpg">
        <h2><b>心得感想:</b></h2> 
            <p>
                昭慶禪寺的周遭非常幽靜，如果想要暫時離開城市的喧囂，可以來此處清修身心靈，是非常不錯的選擇，而且裡面的佛像和石頭雕像非常多元，像是十八羅漢和釋迦彌陀等...等著各位來探索。
                <br><br>如果是信徒的話，這裡有著多座佛尊非常適合進行參拜，會有種洗滌心靈的效果。
            </p>
            
           
            <figure class="effect-a"> 
                <img src="昭慶3.jpg">
                <figcaption>
                    <div class="content">
                        <h3><b>《望佛亭》</b></h3>
                        
                    </div>
                </figcaption>    
            </figure>
            <figure class="effect-a"> 
                <img src="昭慶4.jpg">
                <figcaption>
                    <div class="content">
                        <h3><b>佛像─參拜！！</b></h3>
                        
                    </div>
                </figcaption> 
            </figure>
            <figure class="effect-a">
                <img src="昭慶5.jpg">
                <figcaption>
                    <div class="content">
                        <h3 ><b>《神祇尊稱牆》</b></h3>
                        
                    </div>
                </figcaption>
            </figure>
