<!DOCTYPE html>
<html lang="zh-TW">
    <head>
        <title>明華生態園區</title>
    </head>
    <style>
        
        h3 {
            font-size: 1.875rem;
            font-weight: 300;
            line-height: 2.4rem;
            text-transform: uppercase;
            word-spacing: -.15rem;
        }

        h3{
            color: rgb(245, 243, 243);
        }
        figure.effect-lily{
            opacity: 1;
            position: relative;
            max-width: 400px;
            max-height: 300px;
            margin: 1.5rem;
            background-color: rgb(62, 107, 156);
            overflow: hidden;
            
        }
        figure img{
            
            opacity: 0;
            transform: translate3d(-40px,0,0);
            transition: transform .35s, opacity .35s;
        }
        figure.effect-lily:hover img {
            opacity: 1;
            transform: translate3d(0,0,0);
        }
        figure.effect-lily figcaption {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 2rem;
            box-sizing: border-box;
        }

        figure.effect-lily .content {
            width: 100%;
            height: 50%;
            position: absolute;
            left: 0;
            bottom: 0;
            padding: 2rem;
            box-sizing: border-box;
        }
        figure.effect-lily .content h3{
            opacity: 1;
           transform: translate3d(50px,-90px,0);
            transition: transform .35s;
        }
        figure.effect-lily:hover .content h3{
            opacity:0;
           transform: translate3d(0,0,0);
        }

        figure.effect-a{
            opacity: 1;
            position: relative;
            max-width: 300px;
            max-height: 400px;
            margin: 1.5rem;
            background-color: rgb(156, 62, 115);
            overflow: hidden;
            
        }
        figure img{
            
            opacity: 0;
            transform: translate3d(-40px,0,0);
            transition: transform .35s, opacity .35s;
        }
        figure.effect-a:hover img {
            opacity: 1;
            transform: translate3d(0,0,0);
        }
        figure.effect-a figcaption {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 2rem;
            box-sizing: border-box;
        }

        figure.effect-a .content {
            width: 100%;
            height: 50%;
            position: absolute;
            left: 0;
            bottom: 0;
            padding: 2rem;
            box-sizing: border-box;
        }
        figure.effect-a .content h3{
            opacity: 1;
           transform: translate3d(50px,-90px,0);
            transition: transform .35s;
        }
        figure.effect-a:hover .content h3{
            opacity:0;
           transform: translate3d(0,0,0);
        }

    </style>
    <body>
        <h1><b>成為大自然的小妖精─明華生態園區</b></h1>
            <figure class="effect-lily">
                <img src="明華風景1.jpg">
                <figcaption>
                    <div class="content">
                        <h3><b>點我有美麗風景！！</b></h3>
                        
                    </div>
                </figcaption>
            </figure>
        <h2><b>景點介紹:</b></h2>  
            <p>明華生態園區─全名為:<b>「三疊溪明華濕地生態園區」</b>，總面積為2.7公頃，位於大林鎮明華里，鄰近三疊溪橋，東側為省道台一線交通幹線，正對台灣八大名寺之昭慶禪寺，除了擁有優質的休憩空間外，亦兼具三疊溪水質改善的效能。</p>       
            <img src="明華風景2.jpg">
            <p>
                這裡是個下午休閒散步的好地方，可以忘記都市的那種繁雜，去探索一些鄉間的情調，也是攝影師和網美的拍照聖地，風景真的是美不勝收啊！！！
                <br><br>此地同樣是情侶和伴侶培養感情的地方，適合在此留下彼此間的特殊回憶喔！
                <br><br><b style="color: rgb(255, 0, 51);font-size: 30px;">所以說，想攻略下心目中的他/她的話，明華生態園區是個不錯的選擇！！</b>
            </p>
            <img src="明華風景3.jpg">
            <figure class="effect-a">
                <img src="木槿.JPG">
                <figcaption>
                    <div class="content">
                        <h3><b>前方有...！！</b></h3>
                        
                    </div>
                </figcaption>
            </figure>
        <h2><b>推薦度:</b></h2>
            <p style="font-size:50px;color: rgb(225, 255, 0);"><b>★★★★☆</b></p>

    </body>     
</html>
